spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/odontosuite
    username: postgres
    password: odontosuite
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    baseline-on-migrate: true
    baseline-version: 0
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: "http://localhost:8083/.well-known/jwks.json"
          issuer-uri: "odontosuite-identity"

server:
  port: 8082